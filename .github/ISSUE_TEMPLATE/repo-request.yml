# repo-request.yml defines the form that GitHub shows when a user clicks "New Issue"


name: Repository Request
description: Request a new GitHub repository
title: "[Repo Request]: "
labels:
  - pending-approval
body:
  # Single-line text input field
  - type: input

    id: repo_name
    attributes:
      label: Repository name
      description: Use lowercase letters, numbers, and hyphens only.

      #Example value dsiplayed before user enters text
      placeholder: my-project-service

    validations:
      required: true

  # Multi-line text area
  - type: textarea

    id: business_purpose
    attributes:
      label: Business purpose
      description: Why does this repository need to exist?
      placeholder: Describe the project or service.
    validations:
      required: true

  - type: input
    id: owner_team
    attributes:
      label: Owner team
      description: Team responsible for maintaining this repository.
      placeholder: platform-team
    validations:
      required: true

  # Dropdown selection field
  - type: dropdown
    id: visibility
    attributes:
      label: Visibility
      options:
        - private
        - internal
        - public
    validations:
      required: true

  - type: dropdown
    id: data_classification
    attributes:
      label: Data classification
      options:
        - public
        - internal
        - confidential
        - restricted
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
      description: Anything else approvers should know.
    
    # User may leave this field empty
    validations:
      required: false