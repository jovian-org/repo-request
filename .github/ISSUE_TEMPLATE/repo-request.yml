# Purpose: Define the form that GitHub shows when a user clicks "New Issue"

name: Repository Request
description: Request a new GitHub repository
title: "[Repo Request]: "
body:
  - type: input
    id: repo_name
    attributes:
      label: Repository name
      description: Use lowercase letters, numbers, and hyphens only.
      placeholder: my-project-service
    validations:
      required: true

  - type: textarea
    id: repo_purpose
    attributes:
      label: Repository purpose
      description: Why does this repository need to exist?
      placeholder: Describe the project or service.
    validations:
      required: true

  - type: input
    id: owner_team
    attributes:
      label: Owner team
      description: Team responsible for maintaining this repository.
      placeholder: Assign a team (approver-team or devops-team for now)
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
      description: Anything else approvers should know.
    validations:
      required: false