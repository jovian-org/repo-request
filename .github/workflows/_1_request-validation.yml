# Workflow: Parse request -> Validate policy -> Apply pending-approval OR needs-changes

name: Request Validation

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write      # Allows the workflow to update issue labels
  contents: read     # Allows the workflow to read repository files

jobs:
  validate:
    if: >   # Run only for issues that have not been approved
      github.event.issue.pull_request == null &&
      !contains(github.event.issue.labels.*.name, 'approved') &&
      !contains(github.event.issue.labels.*.name, 'provisioned')
  
    runs-on: ubuntu-latest    # Use a GitHub-hosted Ubuntu runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # Download repository onto runner

      - name: Set up Python
        uses: actions/setup-python@v5   # Install/configure Python
        with: 
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_BODY" > issue_body.txt   # Save the GitHub issue body into a temporary file
          
      - name: Parse request
        run: python scripts/_1_parse_issue.py issue_body.txt request.yml   # Convert the issue body into request.yml using Python CLI Tool

      - name: Show parsed request
        run: |
          echo "===== REQUEST ====="
          cat request.yml

      - name: Validate request
        id: validate    # lets later steps inspect the validation result
        continue-on-error: true   # prevents GitHub from aborting the workflow when validation fails, to handle the failure by applying labels
        run: python scripts/_1_validate_request.py request.yml config/policy.yml   # Run policy validation against the parsed request

      - name: Mark request ready
        if: steps.validate.outcome == 'success'   # only run this step if validation passed
        uses: actions/github-script@v7  # Run JavaScript with authenticated GitHub API access to update the labels in Github
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const requester = context.payload.issue.user.login

            await github.rest.issues.removeAllLabels({
              owner, repo, issue_number
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: ['pending-approval']
            });

      - name: Build approval comment
        run: python scripts/_1_build_approval_comment.py request.yml > approval_comment.txt

      - name: Inform requester
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const requester = context.payload.issue.user.login;
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body:`✅ @${requester} Validation passed. Your request is awaiting approval.`
            });

      - name: Post approval comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');   // Node.js filesystem module to read files
            const approvalComment = fs.readFileSync('approval_comment.txt', 'utf8');    // Read the generated approval comment

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const requester = context.payload.issue.user.login;
            
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body:`@jovianheok Please review this repository request.

              ${approvalComment}`
            });

      - name: Mark request needs changes
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const requester = context.payload.issue.user.login

            await github.rest.issues.removeLabel({
              owner, repo, issue_number, name: 'pending-approval'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: ['needs-changes']
            });

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `❌ @${requester} This repository request did not pass validation. 
              Please review the request and correct any policy violations, then edit the issue to trigger validation again.
              The request will remain in the \`needs-changes\` state until validation succeeds.`
            });

      - name: Debug output
        run: |    # Print useful debugging information
          echo "Issue: ${{ github.event.issue.number }}"
          echo "Validation outcome: ${{ steps.validate.outcome }}"
