# Workflow: Parse request -> Create repository -> Apply: provisioned -> Notify requester

name: Repo Provision

on:
  repository_dispatch:
    types: [repo-provision]

permissions:
  issues: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml pyjwt requests

      - name: Write issue body
        env:
          ISSUE_BODY: ${{ github.event.client_payload.issue_body }}
        run: printf '%s' "$ISSUE_BODY" > issue_body.txt

      - name: Parse request
        run: python scripts/parse_issue.py issue_body.txt request.yml

      - name: Create repository
        id: create_repo
        env:
          ORG_NAME: jovian-org
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          repo_url="$(python scripts/create_repo.py request.yml)"
          echo "repo_url=$repo_url" >> "$GITHUB_OUTPUT"

      - name: Add provisioned label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(context.payload.client_payload.issue_number);

            await github.rest.issues.addLabels({
              owner, repo, issue_number,labels: ['provisioned'],
            })

      - name: Comment requester
        uses: actions/github-script@v7
        with:
          script: |
            const requester = context.payload.client_payload.requester;
            const repoUrl = "${{ steps.create_repo.outputs.repo_url }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(context.payload.client_payload.issue_number);

            await github.rest.issues.createComment({
              owner, repo, issue_number, 
              body: `✅ @${requester} your repository has been provisioned: ${repoUrl}`
            })