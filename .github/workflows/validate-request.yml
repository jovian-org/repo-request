# Workflow to validate request according to policy. Request will only be passed on to the next workflow for approval if this workflow passes.

name: Validate Repository Request

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write      # Allows the workflow to update issue labels
  contents: read     # Allows the workflow to read repository files

jobs:
  validate:
    if: github.event.issue.pull_request == null   # Run only for issues, not pull requests
    runs-on: ubuntu-latest    # Use a GitHub-hosted Ubuntu runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # Download repository onto runner

      - name: Set up Python
        uses: actions/setup-python@v5   # Install/configure Python
        with: 
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml   # Install YAML parsing library

      - name: Extract issue body
        run: cat <<'EOF' > issue_body.txt ${{ github.event.issue.body }}EOF 
        # Save the GitHub issue body into a temporary file
          
      - name: Parse request
        run: python scripts/parse_issue.py issue_body.txt request.yml 
        # Convert the issue body into request.yml using Python CLI Tool

      - name: Validate request
        id: validate    # lets later steps inspect the validation result
        continue-on-error: true
        # prevents GitHub from aborting the workflow when validation fails, to handle the failure by applying labels
        run: python scripts/validate_request.py request.yml config/policy.yml
        # Run policy validation against the parsed request

      - name: Mark request ready
        if: steps.validate.outcome == 'success'   # only run this step if validation passed
        uses: actions/github-script@v7  # Run JavaScript with authenticated GitHub API access to update the labels in Github
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, name: 'needs-changes'
            }).catch(() => {});
            // Remove any previous needs-changes label

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, labels: ['pending-approval']
            });
            // Mark the request as ready for approval

      - name: Mark request needs changes
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, name: 'pending-approval'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo, issue_number, 
              labels: ['needs-changes']
            });

      - name: Debug output
        run: |    # Print useful debugging information
          echo "Issue: ${{ github.event.issue.number }}"
          echo "Validation outcome: ${{ steps.validate.outcome }}"
```
